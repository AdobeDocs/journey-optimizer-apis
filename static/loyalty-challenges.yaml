        desc:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        signupEventName:
          type: string
        dependsOn:
          type: array
          items:
            "$ref": "#/components/schemas/DependsOn"
        tasks:
          type: array
          items:
            oneOf:
            - "$ref": "#/components/schemas/PurchaseTask"
        creationDate:
          type: string
          format: date-time
        lastModifiedDate:
          type: string
          format: date-time
        state:
          type: string
          enum:
          - draft
          - published
          - archived
        tasksToComplete:
          type: integer
          format: int32
        schemaVersion:
          type: integer
          format: int32
        publishedVersion:
          type: integer
          format: int32
        active:
          type: boolean
        autoSignupWhenEventApplied:
          type: boolean
        linkedJourneyContainerId:
          type: string
        linkedJourneyVersionId:
          type: string
        eventTemplates:
          "$ref": "#/components/schemas/EventTemplatesConfig"
        dirtyJourneyState:
          type: boolean
        singleTrans:
          type: boolean
        dayPart:
          "$ref": "#/components/schemas/Daypart"
        personalized:
          type: boolean
        pickYourTask:
          type: boolean
        reward:
          "$ref": "#/components/schemas/Reward"
        personalizedAttributes:
          "$ref": "#/components/schemas/PersonalizedAttributes"
        kvpCustom:
          type: object
          additionalProperties:
            type: string
        uiStash:
          type: string
        createdBy:
          type: string
        lastModifiedBy:
          type: string
        journeyMetadata:
          "$ref": "#/components/schemas/JourneyMetadata"
        milestones:
          "$ref": "#/components/schemas/Milestone"
        audienceId:
          type: string
        p13nDatasetId:
          type: string
        taskTemplates:
          type: array
          items:
            "$ref": "#/components/schemas/TaskTemplate"
    ContentConfig:
      type: object
      description: Content phases for journey messaging
      properties:
        launch:
          "$ref": "#/components/schemas/ContentPhaseConfig"
          description: 'Launch phase messages (initial engagement). Example: welcome
            email, onboarding content card.'
        inProgress:
          "$ref": "#/components/schemas/ContentPhaseConfig"
          description: 'In-progress phase messages (during challenge). Example: reminder
            push, progress update email.'
        end:
          "$ref": "#/components/schemas/ContentPhaseConfig"
          description: 'End phase messages (completion confirmation). Example: congratulations
            email, reward notification.'
    ContentPhaseConfig:
      type: object
      description: Message sequence for a journey phase
      properties:
        messages:
          type: array
          description: Ordered list of messages for this phase
          items:
            "$ref": "#/components/schemas/MessageConfig"
    Daypart:
      type: object
      properties:
        startMinute:
          type: integer
          format: int32
        endMinute:
          type: integer
          format: int32
    DependsOn:
      type: object
      properties:
        challengeId:
          type: string
    EventTemplateDetail:
      type: object
      description: Event definition for journey progression
      properties:
        eventType:
          type: string
          description: Event type identifier (e.g., signup, task_complete, challenge_complete)
          example: signup
        name:
          type: string
          description: Human-readable event name
          example: ChallengeSignupEvent
        description:
          type: string
          description: Event description
          example: Triggered when user opts into the challenge
        namespaceId:
          type: string
          description: Identity namespace for profile matching
          example: LOYALTYID
      required:
      - eventType
      - name
    EventTemplatesConfig:
      type: object
      properties:
        signupEventTemplateId:
          type: string
        taskCompleteEventTemplateId:
          type: string
        challengeCompleteEventTemplateId:
          type: string
    JourneyMetadata:
      type: object
      description: Journey configuration for challenge journeys
      properties:
        metadata:
          "$ref": "#/components/schemas/MetadataConfig"
          description: Core journey metadata including challenge ID and journey name
        audienceQualification:
          "$ref": "#/components/schemas/AudienceQualificationConfig"
          description: Adobe Experience Platform audience/segment configuration
        eventTemplateDetails:
          type: array
          description: Event template definitions for journey events
          items:
            "$ref": "#/components/schemas/EventTemplateDetail"
        content:
          "$ref": "#/components/schemas/ContentConfig"
          description: Content phases with message sequences
      required:
      - audienceQualification
      - content
      - metadata
    MessageConfig:
      type: object
      description: Message configuration for a journey node
      properties:
        type:
          type: string
          description: Message type determining the node type
          enum:
          - contentCard
          - email
          - push
          - inapp
          - wait
          example: email
          pattern: "^(contentCard|email|push|inapp|wait)$"
        surfaceId:
          type: string
          description: Delivery surface ID (required for contentCard, email, push)
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        messageId:
          type: string
          description: Pre-created message ID from Inline Message Service (required
            for contentCard, email, push)
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        actionUID:
          type: string
          description: Unique action ID for the message node. Required for campaign
            message types (contentCard, email, push, inapp). Generated by UI when
            creating inline campaign.
          example: c1d2e3f4-a5b6-7890-cdef-1234567890ab
        name:
          type: string
          description: Human-readable message name (displayed in journey UI)
          example: Welcome Email
        description:
          type: string
          description: Optional message description
          example: Sent when user signs up for challenge
        shouldRepeat:
          type: boolean
          description: Whether this message should repeat (for recurring journeys)
          example: false
        delay:
          type: string
          description: Wait duration for 'wait' type nodes (ISO-8601 duration format)
          example: PT30M
          pattern: "^P(?:\\d+Y)?(?:\\d+M)?(?:\\d+D)?(?:T(?:\\d+H)?(?:\\d+M)?(?:\\d+(?:\\.\\d+)?S)?)?$"
      required:
      - name
      - type
    MetadataConfig:
      type: object
      description: Journey metadata for context and challenge linking
      properties:
        creationStatus:
          type: string
          description: 'Journey creation status: ''inProgress'' (building) or ''created''
            (journey exists)'
          example: inProgress
        challengeId:
          type: string
          description: Associated challenge UUID (required - journey must be linked
            to a challenge)
          example: 507f1f77-bcf8-6cd7-9943-9011abcd1234
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
        journeyName:
          type: string
          description: Journey name displayed in Adobe Journey Optimizer UI
          example: Holiday Challenge Journey
        taskNames:
          type: object
          additionalProperties:
            type: string
          description: Task names by index (used for event naming)
          example:
            '0': Complete 5 transactions
            '1': Spend $100
        numberOfTasks:
          type: integer
          format: int32
      required:
      - challengeId
      - journeyName
