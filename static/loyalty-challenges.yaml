  "/loyalty/metadata/journeys/from-challenge/{challengeId}":
    put:
      tags:
      - Journey Auto-Creation
      summary: Update journey from Challenge's persisted JourneyMetadata
      description: 'Loads journeyMetadata from the specified Challenge and updates
        the existing journey. '
      operationId: updateJourneyFromChallenge
      parameters:
      - name: challengeId
        in: path
        description: Challenge ID containing journeyMetadata
        required: true
        schema:
          type: string
      - name: publishChallenge
        in: query
        description: Whether to publish the challenge before creating the journey.
          If true and challenge is draft, validates and publishes first. If false
          (default), challenge must already be published.
        required: false
        schema:
          type: boolean
          default: false
      - name: x-api-key
        in: header
        description: API Key
        required: true
        schema:
          type: string
      - name: x-gw-ims-org-id
        in: header
        description: IMS Organization ID
        required: true
        schema:
          type: string
      - name: x-sandbox-id
        in: header
        description: Sandbox ID (UUID)
        required: false
        schema:
          type: string
      - name: x-sandbox-name
        in: header
        description: Sandbox Name
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Authorization token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Journey updated successfully
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/JourneyCreationResult"
        '400':
          description: Challenge must be published first (when publishChallenge=false)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemDetail"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemDetail"
        '404':
          description: Challenge not found or has no journeyMetadata
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemDetail"
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemDetail"
        '422':
          description: Challenge publish validation failed (when publishChallenge=true)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemDetail"
        '500':
          description: Journey update failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemDetail"
