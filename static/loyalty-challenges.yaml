          example: surfaceId is required for contentCard messages
        rejectedValue:
          type: object
          description: The value that was rejected (null if missing)
          example: 
        code:
          type: string
          description: Error code for programmatic handling
          enum:
          - VALIDATION_REQUIRED_FIELD_MISSING
          - VALIDATION_INVALID_FORMAT
          - VALIDATION_INVALID_VALUE
          - VALIDATION_CONSTRAINT_VIOLATION
          example: VALIDATION_REQUIRED_FIELD_MISSING
    ValidationErrorResponse:
      type: object
      description: Request validation error response (400 Bad Request)
      properties:
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error occurred
          example: '2025-11-25T22:30:45.123Z'
        status:
