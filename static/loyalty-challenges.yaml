        archiveTTLDays:
          type: integer
          format: int64
        provideChallengeInSignupResponse:
          type: boolean
        eventPathPipeline:
          type: boolean
        version:
          type: integer
          format: int32
        voyagerTopicOverride:
          type: string
    PayloadDefinition:
      type: object
