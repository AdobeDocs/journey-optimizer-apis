    RewardDefinition:
      type: object
      properties:
        guid:
          type: string
          description: Unique identifier for this reward definition
          readOnly: true
        name:
          type: string
          description: Display name of the reward definition. Must be unique within
            a provider.
        denomination:
          type: string
          description: Unit of the reward (e.g. Stars, Miles, Points)
        desc:
          type: string
          description: Human-readable description of the reward
        enabled:
          type: boolean
          description: Whether this reward definition is active and available for
            use
        kvpCustom:
          type: object
          additionalProperties:
            type: string
          description: Custom key-value pairs for additional reward metadata
        rewardJsonata:
          type: string
          description: JSONata expression to transform the reward payload before sending
            to the provider
        isDefault:
          type: boolean
          description: Marks this reward definition as the org-wide default. Used
            to auto-populate reward endpoint and definition on personalized challenges
            at publish time. Only one reward definition across all providers can be
            the default; setting a new default automatically clears the previous one.
    RewardEndpointDefinition:
      type: object
